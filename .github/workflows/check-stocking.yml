name: Check MD DNR Trout Stocking Page

on:
  schedule:
    - cron: '0 7,13,19 * * *'  # 7am, 1pm, 7pm UTC (3am, 9am, 3pm ET)
  workflow_dispatch:            # Allow manual trigger from GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Check for changes
        id: check
        run: python scripts/check_page.py

      - name: Send email notification
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "${{ steps.check.outputs.email_subject }}"
          to: ${{ secrets.EMAIL_TO }}
          from: Trout Stocking Watcher <${{ secrets.EMAIL_USERNAME }}>
          body: "${{ steps.check.outputs.email_body }}"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gunpowder_rows.json data/last_check.json
          git diff --cached --quiet || git commit -m "chore: update stocking snapshot [skip ci]"
          git push
